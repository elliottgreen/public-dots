# shortened for brevity
print_info() {
  info title
  info underline

  info "OS" distro
  info "Host" model
  info "Kernel" kernel
  info "GPU" gpu
  info "CPU" cpu
  info "Terminal" term
  info "Shell" shell
  info "IP Address" local_ip
  info "Uptime" uptime

  info "Open Ports" open_ports
  info "Systemd" running_services

  info "Memory" memory
  info cols
}

open_ports() {
  ss -tulnH 2>/dev/null |
    awk '{print $5}' |
    sed -E 's/.*:([0-9]+)$/\1/' |
    sort -n |
    uniq |
    paste -sd ', ' -
}

running_services() {
  systemctl list-units --type=service --state=running --no-legend 2>/dev/null |
    awk '{print $1}' |
    sed 's/\.service$//' |
    head -n 8 |
    paste -sd ', ' -
}

# Quality of life tweaks
memory_unit="gib"
speed_shorthand="on"
